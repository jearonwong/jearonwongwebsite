<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="tc1 dc1">
  <title id="tc1">Three Perspectives: Consensus Layer</title>
  <desc id="dc1">Table showing the three orchestration perspectives — Coordination, Authority/Risk, Evidence/Acceptance — with their responsibilities and core questions.</desc>
  <defs>
    <style>
      .bg{fill:#111111}
      .outer{fill:none;stroke:rgba(241,245,249,0.16);stroke-width:1.2}
      .kicker{fill:#22d3ee;font:700 17px "JetBrains Mono",Menlo,monospace;letter-spacing:1.4px}
      .ttl{fill:#f1f5f9;font:800 40px "Outfit",Inter,sans-serif}
      .th{fill:#22d3ee;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:1px}
      .td-key{fill:#f1f5f9;font:700 16px Inter,sans-serif}
      .td-red{fill:#f87171;font:700 16px Inter,sans-serif}
      .td-blue{fill:#60a5fa;font:700 16px Inter,sans-serif}
      .td{fill:#94a3b8;font:400 15px Inter,sans-serif}
      .footer{fill:#64748b;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:0.8px}
    </style>
    <pattern id="gtc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(241,245,249,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="620" class="bg"/>
  <rect width="1600" height="620" fill="url(#gtc)"/>
  <rect x="52" y="28" width="1496" height="564" class="outer"/>

  <!-- Header -->
  <text x="82" y="72" class="kicker">DEFINE THE AI AGENT LIFECYCLE / ESSAY 03</text>
  <text x="82" y="118" class="ttl">Three Perspectives: Orchestrator Consensus Layer</text>

  <!-- Table: x=82 w=1436. Col1=280 Col2=740 Col3=416 -->
  <!-- Header row: y=142 h=44 -->
  <rect x="82"   y="142" width="280" height="44" fill="rgba(34,211,238,0.1)"  stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <rect x="362"  y="142" width="740" height="44" fill="rgba(34,211,238,0.1)"  stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <rect x="1102" y="142" width="416" height="44" fill="rgba(34,211,238,0.1)"  stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="102"  y="169" class="th">PERSPECTIVE</text>
  <text x="382"  y="169" class="th">RESPONSIBILITY</text>
  <text x="1122" y="169" class="th">CORE QUESTION</text>

  <!-- Row 1: Coordination view — y=186 h=110 -->
  <rect x="82"   y="186" width="280" height="110" fill="rgba(34,211,238,0.05)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <rect x="362"  y="186" width="740" height="110" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <rect x="1102" y="186" width="416" height="110" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <text x="102" y="232" class="td-key">Coordination view</text>
  <text x="382" y="218" class="td">Goal decomposition, path organization,</text>
  <text x="382" y="238" class="td">task assignment, who executes</text>
  <text x="1122" y="218" class="td">How should work be done,</text>
  <text x="1122" y="238" class="td">and by whom</text>

  <!-- Row 2: Authority/Risk view — y=296 h=110 -->
  <rect x="82"   y="296" width="280" height="110" fill="rgba(239,68,68,0.06)"  stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <rect x="362"  y="296" width="740" height="110" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <rect x="1102" y="296" width="416" height="110" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <text x="102" y="340" class="td-red">Authority / Risk view</text>
  <text x="382" y="328" class="td">Authorization, boundary check,</text>
  <text x="382" y="348" class="td">confirmation need, risk boundary trigger</text>
  <text x="1122" y="328" class="td">Is this permitted,</text>
  <text x="1122" y="348" class="td">where is the risk</text>

  <!-- Row 3: Evidence/Acceptance view — y=406 h=110 -->
  <rect x="82"   y="406" width="280" height="110" fill="rgba(59,130,246,0.06)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <rect x="362"  y="406" width="740" height="110" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <rect x="1102" y="406" width="416" height="110" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.08)" stroke-width="1"/>
  <text x="102" y="450" class="td-blue">Evidence / Acceptance view</text>
  <text x="382" y="438" class="td">Evidence sufficiency, result reviewability,</text>
  <text x="382" y="458" class="td">acceptance condition met</text>
  <text x="1122" y="438" class="td">Is this truly done,</text>
  <text x="1122" y="458" class="td">can it be accepted</text>

  <!-- Footer -->
  <text x="82" y="590" class="footer">jearonwong.com / Define The AI Agent Lifecycle / Essay 03</text>
</svg>
