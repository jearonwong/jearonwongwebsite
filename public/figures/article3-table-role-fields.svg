<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="trf drF">
  <title id="trf">Role Definition: Seven Required Fields</title>
  <desc id="drF">Table listing the seven required fields for every Agent Role definition: activation condition, deactivation condition, responsibility boundary, authority scope, evidence obligation, confirmation relationship, and acceptance impact.</desc>
  <defs>
    <style>
      .bg{fill:#111111}
      .outer{fill:none;stroke:rgba(241,245,249,0.16);stroke-width:1.2}
      .kicker{fill:#22d3ee;font:700 17px "JetBrains Mono",Menlo,monospace;letter-spacing:1.4px}
      .ttl{fill:#f1f5f9;font:800 40px "Outfit",Inter,sans-serif}
      .th{fill:#22d3ee;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:1px}
      .td-key{fill:#f1f5f9;font:700 15px "JetBrains Mono",Menlo,monospace;letter-spacing:0.4px}
      .td{fill:#94a3b8;font:400 15px Inter,sans-serif}
      .footer{fill:#64748b;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:0.8px}
    </style>
    <pattern id="grf" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(241,245,249,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="700" class="bg"/>
  <rect width="1600" height="700" fill="url(#grf)"/>
  <rect x="52" y="28" width="1496" height="644" class="outer"/>

  <!-- Header -->
  <text x="82" y="72" class="kicker">DEFINE THE AI AGENT LIFECYCLE / ESSAY 03</text>
  <text x="82" y="118" class="ttl">Role Definition: Seven Required Fields</text>

  <!-- Table: Col1=340 (field name) Col2=1096 (meaning). Total=1436 -->
  <!-- Header row: y=142 h=44 -->
  <rect x="82"  y="142" width="340"  height="44" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <rect x="422" y="142" width="1096" height="44" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="102" y="169" class="th">FIELD</text>
  <text x="442" y="169" class="th">MEANING</text>

  <!-- 7 rows, h=70 each. y starts at 186 -->
  <!-- Row 1: Activation condition -->
  <rect x="82"  y="186" width="340"  height="70" fill="rgba(34,211,238,0.04)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="186" width="1096" height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="226" class="td-key">Activation condition</text>
  <text x="442" y="226" class="td">Under what circumstances should this Role be activated</text>

  <!-- Row 2: Deactivation condition -->
  <rect x="82"  y="256" width="340"  height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="256" width="1096" height="70" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="296" class="td-key">Deactivation condition</text>
  <text x="442" y="296" class="td">Under what circumstances should this Role be suspended or deactivated</text>

  <!-- Row 3: Responsibility boundary -->
  <rect x="82"  y="326" width="340"  height="70" fill="rgba(34,211,238,0.04)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="326" width="1096" height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="366" class="td-key">Responsibility boundary</text>
  <text x="442" y="366" class="td">What this Role is responsible for, and what it is not</text>

  <!-- Row 4: Authority scope -->
  <rect x="82"  y="396" width="340"  height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="396" width="1096" height="70" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="436" class="td-key">Authority scope</text>
  <text x="442" y="436" class="td">What this Role is authorized to do, what is prohibited</text>

  <!-- Row 5: Evidence obligation -->
  <rect x="82"  y="466" width="340"  height="70" fill="rgba(34,211,238,0.04)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="466" width="1096" height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="506" class="td-key">Evidence obligation</text>
  <text x="442" y="506" class="td">What evidence this Role must produce before handing off a task</text>

  <!-- Row 6: Confirmation relationship -->
  <rect x="82"  y="536" width="340"  height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="536" width="1096" height="70" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="576" class="td-key">Confirmation relationship</text>
  <text x="442" y="576" class="td">Which human role needs to confirm certain operations of this Role</text>

  <!-- Row 7: Acceptance impact -->
  <rect x="82"  y="606" width="340"  height="70" fill="rgba(34,211,238,0.04)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="422" y="606" width="1096" height="70" fill="rgba(255,255,255,0.02)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="646" class="td-key">Acceptance impact</text>
  <text x="442" y="646" class="td">How this Role's output affects downstream acceptance judgment</text>

  <!-- Footer -->
  <text x="82" y="688" class="footer">jearonwong.com / Define The AI Agent Lifecycle / Essay 03</text>
</svg>
