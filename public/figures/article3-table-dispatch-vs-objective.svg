<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="tdo ddo">
  <title id="tdo">Execution Dispatch vs Delivery-grade Verifiable Objective</title>
  <desc id="ddo">Comparison table contrasting execution dispatch (action item) with delivery-grade verifiable objective across six dimensions: who executes, what to do, output focus, completion behavior, rollback definition, and task nature.</desc>
  <defs>
    <style>
      .bg{fill:#111111}
      .outer{fill:none;stroke:rgba(241,245,249,0.16);stroke-width:1.2}
      .kicker{fill:#22d3ee;font:700 17px "JetBrains Mono",Menlo,monospace;letter-spacing:1.4px}
      .ttl{fill:#f1f5f9;font:800 40px "Outfit",Inter,sans-serif}
      .th-l{fill:#64748b;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:1px}
      .th-r{fill:#22d3ee;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:1px}
      .td-l{fill:#64748b;font:400 15px Inter,sans-serif}
      .td-r{fill:#f1f5f9;font:400 15px Inter,sans-serif}
      .td-r-strong{fill:#22d3ee;font:700 15px Inter,sans-serif}
      .footer{fill:#64748b;font:700 14px "JetBrains Mono",Menlo,monospace;letter-spacing:0.8px}
    </style>
    <pattern id="gdo" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(241,245,249,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="680" class="bg"/>
  <rect width="1600" height="680" fill="url(#gdo)"/>
  <rect x="52" y="28" width="1496" height="624" class="outer"/>

  <!-- Header -->
  <text x="82" y="72" class="kicker">DEFINE THE AI AGENT LIFECYCLE / ESSAY 03</text>
  <text x="82" y="118" class="ttl">Execution Dispatch vs Verifiable Objective</text>

  <!-- Divider line down center -->
  <!-- Table: Col1=718 Col2=718. Total=1436. x=82 -->
  <!-- Header row: y=142 h=50 -->
  <rect x="82"  y="142" width="718" height="50" fill="rgba(100,116,139,0.1)" stroke="rgba(100,116,139,0.3)" stroke-width="1"/>
  <rect x="800" y="142" width="718" height="50" fill="rgba(34,211,238,0.1)"  stroke="rgba(34,211,238,0.35)" stroke-width="1"/>
  <text x="102" y="172" class="th-l">EXECUTION DISPATCH</text>
  <text x="820" y="172" class="th-r">DELIVERY-GRADE VERIFIABLE OBJECTIVE</text>

  <!-- Row heights: 70px each, 6 rows. y starts at 192 -->
  <!-- Row 1 -->
  <rect x="82"  y="192" width="718" height="70" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="800" y="192" width="718" height="70" fill="rgba(34,211,238,0.03)"   stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="232" class="td-l">Specifies who executes</text>
  <text x="820" y="232" class="td-r">Specifies which Role within which responsibility boundary</text>

  <!-- Row 2 -->
  <rect x="82"  y="262" width="718" height="70" fill="rgba(255,255,255,0.02)"  stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="800" y="262" width="718" height="70" fill="rgba(34,211,238,0.04)"   stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="292" class="td-l">Describes what to do</text>
  <text x="820" y="286" class="td-r">Describes scope, constraints,</text>
  <text x="820" y="306" class="td-r">evidence requirements, acceptance conditions</text>

  <!-- Row 3 -->
  <rect x="82"  y="332" width="718" height="70" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="800" y="332" width="718" height="70" fill="rgba(34,211,238,0.03)"   stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="372" class="td-l">Focused on output</text>
  <text x="820" y="372" class="td-r">Focused on whether output enters review/acceptance chain</text>

  <!-- Row 4 -->
  <rect x="82"  y="402" width="718" height="70" fill="rgba(255,255,255,0.02)"  stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="800" y="402" width="718" height="70" fill="rgba(34,211,238,0.04)"   stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="442" class="td-l">Continues after completion</text>
  <text x="820" y="432" class="td-r">Enters evidence/review/acceptance</text>
  <text x="820" y="452" class="td-r">judgment after completion</text>

  <!-- Row 5 -->
  <rect x="82"  y="472" width="718" height="70" fill="rgba(255,255,255,0.015)" stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <rect x="800" y="472" width="718" height="70" fill="rgba(34,211,238,0.03)"   stroke="rgba(241,245,249,0.07)" stroke-width="1"/>
  <text x="102" y="512" class="td-l">No rollback definition</text>
  <text x="820" y="502" class="td-r">Explicitly defines rollback/compensation</text>
  <text x="820" y="522" class="td-r">condition on failure</text>

  <!-- Row 6 — highlight -->
  <rect x="82"  y="542" width="718" height="70" fill="rgba(100,116,139,0.06)" stroke="rgba(100,116,139,0.2)" stroke-width="1"/>
  <rect x="800" y="542" width="718" height="70" fill="rgba(34,211,238,0.08)"  stroke="rgba(34,211,238,0.3)"  stroke-width="1.5"/>
  <text x="102" y="582" class="td-l">Task is an action item</text>
  <text x="820" y="582" class="td-r-strong">Task is a lifecycle-bound verifiable objective</text>

  <!-- Footer -->
  <text x="82" y="668" class="footer">jearonwong.com / Define The AI Agent Lifecycle / Essay 03</text>
</svg>
